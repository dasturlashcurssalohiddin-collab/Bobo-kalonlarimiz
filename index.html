<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>Index Page – Ariza Formasi</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://cdn.jsdelivr.net/npm/jwt-decode@3.1.2/build/jwt-decode.min.js"></script>
<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#667eea,#764ba2);
    margin:0; padding:0;
    display:flex; justify-content:center; align-items:center;
    min-height:100vh;
}
.container {
    background:#fff; color:#333;
    padding:30px 25px; border-radius:20px;
    max-width:480px; width:100%;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}
h2 {text-align:center;margin-bottom:25px;font-size:28px;color:#333;}
input, select, textarea, button {
    width:100%; padding:10px; margin:8px 0; border-radius:8px; border:1px solid #ccc;
}
button {background:#667eea; color:#fff; font-weight:bold; cursor:pointer; transition:0.3s;}
button:hover {background:#5a67d8;}
#error {color:red; margin:5px 0; font-size:14px;}
</style>
</head>
<body>

<div class="container">
<h2>Ariza Formasi</h2>
<div id="gSignIn"></div>
<form id="form" style="display:none;">
<label>F.I.SH:</label>
<input type="text" id="name" placeholder="Ism Familiya">
<label>Email:</label>
<input type="text" id="email" readonly>
<label>Telefon:</label>
<input type="text" id="phone" placeholder="901234567">
<label>Qo‘shimcha:</label>
<textarea id="extra" placeholder="Qo‘shimcha ma’lumot"></textarea>
<button type="submit">Yuborish</button>
<button type="button" id="deleteBtn">Delete All</button>
<div id="error"></div>
</form>
</div>

<script>
const CLIENT_ID = "318653553640-uv3r040c4im18no4mjeq8eeomj24b1o8.apps.googleusercontent.com";

// GOOGLE SIGN-IN CALLBACK
function handleCredentialResponse(res){
    const data = jwt_decode(res.credential);
    localStorage.setItem("userName", data.name);
    localStorage.setItem("userEmail", data.email);

    // redirect faqat birinchi kirishda
    if(!localStorage.getItem("redirectedToBobo")){
        localStorage.setItem("redirectedToBobo","true");
        window.location.href = "bobo-kalonlar.html";
        return;
    }

    showForm(data);
}

// SHOW FORM AND FILL DATA
function showForm(data){
    document.getElementById("gSignIn").style.display="none";
    const form = document.getElementById("form");
    form.style.display="block";

    document.getElementById("name").value = localStorage.getItem("arizaName") || data.name;
    document.getElementById("email").value = data.email;
    document.getElementById("phone").value = localStorage.getItem("arizaPhone") || "";
    document.getElementById("extra").value = localStorage.getItem("arizaExtra") || "";
}

// FORM SUBMIT
document.getElementById("form").addEventListener("submit", function(e){
    e.preventDefault();
    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const phone = document.getElementById("phone").value.trim();
    const extra = document.getElementById("extra").value.trim();

    if(!name){ document.getElementById("error").innerText="Ism Familiya kiritilmadi!"; return; }

    // Saqlash
    localStorage.setItem("arizaName", name);
    localStorage.setItem("arizaPhone", phone);
    localStorage.setItem("arizaExtra", extra);

    alert("Ma’lumotlar saqlandi!");
});

// DELETE ALL
document.getElementById("deleteBtn").addEventListener("click", ()=>{
    if(confirm("Hamma saqlangan ma'lumotlar o'chirilsinmi?")){
        localStorage.removeItem("arizaName");
        localStorage.removeItem("arizaPhone");
        localStorage.removeItem("arizaExtra");
        localStorage.removeItem("userName");
        localStorage.removeItem("userEmail");
        localStorage.removeItem("redirectedToBobo");
        location.reload();
    }
});

// WINDOW ONLOAD
window.onload = () => {
    const nameSaved = localStorage.getItem("userName");
    const emailSaved = localStorage.getItem("userEmail");
    const redirected = localStorage.getItem("redirectedToBobo");

    if(nameSaved && redirected){
        showForm({name:nameSaved,email:emailSaved});
    }

    google.accounts.id.initialize({ client_id: CLIENT_ID, callback: handleCredentialResponse });
    google.accounts.id.renderButton(document.getElementById("gSignIn"), { size:"large" });
};
</script>

</body>
</html>
